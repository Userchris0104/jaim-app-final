name = "jaim-final"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./build/client"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "jaim-final-db"
database_id = "30336a5c-3520-4a2f-afde-80fcfe4655d9"

# R2 Storage
[[r2_buckets]]
binding = "R2"
bucket_name = "jaim-final-assets"

# Environment variables
[vars]
ENVIRONMENT = "production"
USE_MOCK_PLATFORMS = "false"  # Set to "true" for local development with mock TikTok/Meta APIs

# Anthropic Claude — ad copy generation
# ANTHROPIC_API_KEY = "your-key-here"
# Get key at: console.anthropic.com

# Google Gemini — PRIMARY scene/ad image generation
# GEMINI_API_KEY = "your-gemini-api-key-here"
# Get your key at: https://aistudio.google.com/apikey
# Model: gemini-3.1-flash-image-preview
# Cost: $0.039/image (standard), $0.0195/image (batch)

# fal.ai — background removal only (Bria RMBG)
# FAL_API_KEY = "your-fal-api-key-here"
# Get your key at: https://fal.ai/dashboard
# Cost: $0.018/image for background removal

# FashnAI — virtual try-on for fashion products (NOT used in ad generation pipeline)
# FASHNAI_API_KEY = "your-fashnai-api-key-here"
# Get your key at: https://fashn.ai

# OpenAI — product image analysis (GPT-4o-mini vision)
# OPENAI_API_KEY = "your-openai-api-key-here"
# Get your key at: https://platform.openai.com

# Photoroom — product fitting with shadows and relighting
# PHOTOROOM_API_KEY = "your-photoroom-api-key-here"
# Get your key at: https://www.photoroom.com/api
